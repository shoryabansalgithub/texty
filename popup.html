<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 240px;
    background: #0a0a0f;
    color: #e4e4ec;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 11.5px;
    -webkit-font-smoothing: antialiased;
    padding: 16px;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .logo {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    color: #6b6b7d;
  }
  .status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-top: 1px solid #1a1a28;
  }
  .status-label {
    color: #8b8b9f;
  }
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
  }
  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .toggle .slider {
    position: absolute;
    inset: 0;
    background: #1f1f2e;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .toggle .slider::after {
    content: "";
    position: absolute;
    width: 14px;
    height: 14px;
    left: 3px;
    top: 3px;
    background: #6b6b7d;
    border-radius: 50%;
    transition: transform 0.15s, background 0.15s;
  }
  .toggle input:checked + .slider {
    background: #4ade80;
  }
  .toggle input:checked + .slider::after {
    transform: translateX(16px);
    background: #0a0a0f;
  }
  .hint {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid #1a1a28;
    color: #6b6b7d;
    font-size: 10px;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="header">
    <span class="logo">Texty</span>
    <span class="badge">v1.0</span>
  </div>
  <div class="status-row">
    <span class="status-label">Enabled</span>
    <label class="toggle">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="hint">
    Hover or click any text on the page to inspect typography.
  </div>
  <script src="popup.js"></script>
</body>
</html>
